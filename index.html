<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donodaseves AI Hub</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤖</text></svg>">
<style>
  :root {
    --mono: ui-monospace, "SF Mono", "Cascadia Code", "Fira Code", "JetBrains Mono", Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --radius: 10px;
    --dur: 160ms;
  }

  html[data-theme="dark"] {
    --bg: #0F1215;
    --surface: #171B1F;
    --surface-alt: #1E2328;
    --border: #2A2F35;
    --border-soft: #232830;
    --text: #E6E8EA;
    --text-muted: #8B929A;
    --text-faint: #565D65;
    --focus: #5B8DEF;
    --danger: #E5533D;
    --shadow: 0 8px 24px rgba(0,0,0,0.35);
  }

  html[data-theme="light"] {
    --bg: #F3F4F6;
    --surface: #FFFFFF;
    --surface-alt: #F8F9FA;
    --border: #DDE1E4;
    --border-soft: #E7E9EB;
    --text: #1A1D20;
    --text-muted: #63696F;
    --text-faint: #9BA1A7;
    --focus: #3B6FD9;
    --danger: #C13F2B;
    --shadow: 0 8px 24px rgba(20,20,30,0.08);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    transition: background var(--dur) ease, color var(--dur) ease;
    padding-bottom: 60px;
  }

  a { color: inherit; text-decoration: none; }

  :focus-visible {
    outline: 2px solid var(--focus);
    outline-offset: 2px;
  }

  .wrap {
    max-width: 980px;
    margin: 0 auto;
    padding: 28px 20px 0;
  }

  /* ---------- Header ---------- */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding-bottom: 22px;
    border-bottom: 1px solid var(--border-soft);
    margin-bottom: 28px;
  }

  .brand h1 {
    margin: 0;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  .header-controls {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .icon-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 8px;
    padding: 8px 12px;
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: border-color var(--dur), color var(--dur), background var(--dur);
  }
  .icon-btn:hover { border-color: var(--focus); color: var(--text); }
  .icon-btn[aria-pressed="true"] { background: var(--focus); color: #fff; border-color: var(--focus); }

  /* ---------- AI Grid ---------- */
  section.deck { margin-bottom: 32px; }

  .ai-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }

  .ai-card {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 4px solid var(--accent, var(--focus));
    border-radius: var(--radius);
    padding: 16px 16px 14px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 4px;
    transition: transform var(--dur) ease, box-shadow var(--dur) ease, border-color var(--dur) ease;
  }
  .ai-card:hover, .ai-card:focus-visible {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px -6px var(--accent, var(--focus));
  }
  .ai-card:active { transform: translateY(0); }

  .ai-card .name {
    font-size: 15px;
    font-weight: 600;
  }
  .ai-card .desc {
    font-size: 12px;
    color: var(--text-muted);
  }
  .ai-card .keycap {
    position: absolute;
    top: 10px;
    right: 10px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-faint);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 5px;
    background: var(--surface-alt);
  }

  /* ---------- Utility panel ---------- */
  .utility-panel {
    display: grid;
    grid-template-columns: 1.3fr 1fr;
    gap: 16px;
  }

  @media (max-width: 720px) {
    .utility-panel { grid-template-columns: 1fr; }
  }

  .panel-col { display: flex; flex-direction: column; gap: 16px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
  }

  .card h2 {
    margin: 0 0 10px;
    font-size: 12px;
    font-family: var(--mono);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .draft-hint {
    font-size: 10px;
    letter-spacing: 0.04em;
    text-transform: none;
    color: var(--text-faint);
  }

  .draft-meta {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-faint);
    margin-top: 6px;
  }

  textarea#draft, textarea#notes, textarea#cleaner {
    width: 100%;
    min-height: 140px;
    resize: vertical;
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13.5px;
    padding: 10px 12px;
    line-height: 1.5;
  }

  textarea#notes { min-height: 90px; }
  textarea#cleaner { min-height: 110px; }

  .row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }

  .chip {
    display: inline-block;
    background: var(--surface-alt);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 11.5px;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: border-color var(--dur), color var(--dur);
  }
  .chip:hover { border-color: var(--focus); color: var(--text); }

  .prompt-divider {
    flex-basis: 100%;
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-faint);
  }
  .prompt-divider::before,
  .prompt-divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .prompt-divider.divider-start { margin: 0 0 6px; }
  .prompt-divider.divider-end { margin: 16px 0 6px; }
  .prompt-divider.divider-mood { margin: 16px 0 6px; }

  .btn {
    background: var(--surface-alt);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 12.5px;
    font-weight: 600;
    padding: 7px 14px;
    border-radius: 6px;
    cursor: pointer;
    transition: border-color var(--dur), background var(--dur);
  }
  .btn:hover { border-color: var(--focus); }
  .btn.primary { background: var(--focus); color: #fff; border-color: var(--focus); }
  .btn.primary:hover { filter: brightness(1.08); }
  .btn.danger-outline { color: var(--danger); border-color: var(--danger); background: transparent; }
  .btn.danger-outline:hover { background: var(--danger); color: #fff; }

  .search-row { display: flex; gap: 8px; }
  input[type="text"]#wiki-input {
    flex: 1;
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 13.5px;
    padding: 9px 12px;
  }

  .wiki-status {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 8px;
    min-height: 16px;
  }

  /* ---------- Shortcuts ---------- */
  .shortcut-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 0;
    font-size: 12.5px;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border-soft);
  }
  .shortcut-row:last-child { border-bottom: none; }
  .shortcut-key {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-faint);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 7px;
    background: var(--surface-alt);
  }

  /* ---------- Focus mode ---------- */
  body.focus-mode .utility-panel,
  body.focus-mode .timer-row {
    display: none;
  }

  /* ---------- Timer / Stopwatch ---------- */
  .timer-row {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
    margin: 0 auto 28px;
  }
  .timer-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    min-width: 190px;
  }
  .timer-label {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .pomodoro-time {
    font-family: var(--mono);
    font-size: 36px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .timer-set-row {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .timer-set-row input {
    width: 60px;
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 6px 8px;
    text-align: center;
  }
  .pomodoro-controls {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* ---------- Command palette ---------- */
  .cmdk-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    align-items: flex-start;
    justify-content: center;
    padding-top: 12vh;
    z-index: 1000;
  }
  .cmdk-overlay.open { display: flex; }
  .cmdk-box {
    width: 90%;
    max-width: 480px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .cmdk-input {
    width: 100%;
    box-sizing: border-box;
    background: var(--surface-alt);
    border: none;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    font-size: 15px;
    font-family: var(--sans);
    padding: 14px 16px;
  }
  .cmdk-input:focus { outline: none; }
  .cmdk-list { max-height: 320px; overflow-y: auto; }
  .cmdk-item {
    padding: 10px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    cursor: pointer;
    font-size: 13.5px;
  }
  .cmdk-item .cmdk-tag {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-faint);
  }
  .cmdk-item.active, .cmdk-item:hover { background: var(--surface-alt); }
  .cmdk-empty {
    padding: 14px 16px;
    font-size: 12.5px;
    color: var(--text-faint);
  }
  .cmdk-hint {
    padding: 8px 16px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-faint);
    border-top: 1px solid var(--border-soft);
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }

  footer {
    max-width: 980px;
    margin: 30px auto 0;
    padding: 0 20px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-faint);
    text-align: center;
  }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="brand">
      <h1>Donodaseves AI Hub</h1>
    </div>
    <div class="header-controls">
      <button class="icon-btn" id="cmdk-trigger" title="Command palette (Ctrl+K)">⌘K Search</button>
      <button class="icon-btn" id="focus-toggle" aria-pressed="false" title="Toggle Focus Mode">◧ Focus</button>
      <button class="icon-btn" id="theme-toggle" title="Toggle theme">☾ Theme</button>
    </div>
  </header>

  <section class="deck">
    <div class="ai-grid" id="ai-grid"></div>
  </section>

  <div class="timer-row" id="timer-row">
    <div class="timer-card">
      <div class="timer-label">Timer</div>
      <div class="pomodoro-time" id="pomo-time">25:00</div>
      <div class="timer-set-row">
        <input type="number" id="pomo-minutes" min="1" max="180" value="25">
        <button class="btn" id="pomo-set" type="button">Set</button>
      </div>
      <div class="pomodoro-controls">
        <button class="btn primary" id="pomo-start" type="button">Start</button>
        <button class="btn danger-outline" id="pomo-reset" type="button">Reset</button>
      </div>
    </div>
    <div class="timer-card">
      <div class="timer-label">Stopwatch</div>
      <div class="pomodoro-time" id="sw-time">00:00</div>
      <div class="pomodoro-controls">
        <button class="btn primary" id="sw-start" type="button">Start</button>
        <button class="btn danger-outline" id="sw-reset" type="button">Reset</button>
      </div>
    </div>
  </div>

  <section class="utility-panel">
    <div class="panel-col">
      <div class="card">
        <h2>Draft <span class="draft-hint">press / to jump here</span></h2>
        <textarea id="draft" placeholder="Write or paste a prompt here..."></textarea>
        <div class="draft-meta" id="draft-meta">0 words · 0 characters</div>
        <div class="row" id="prompt-lib"></div>
        <div class="row">
          <button class="btn primary" id="copy-draft">Copy</button>
          <button class="btn" id="save-draft">Save .txt</button>
          <button class="btn danger-outline" id="clear-draft">Clear</button>
        </div>
      </div>
    </div>

    <div class="panel-col">
      <div class="card">
        <h2>Wikipedia</h2>
        <div class="search-row">
          <input type="text" id="wiki-input" placeholder="Search Wikipedia...">
          <button class="btn primary" id="wiki-btn">Search</button>
        </div>
        <div class="wiki-status" id="wiki-status"></div>
      </div>

      <div class="card">
        <h2>Notes <button class="chip" id="notes-clear" style="font-size:10px;padding:3px 8px;">clear</button></h2>
        <textarea id="notes" placeholder="Quick notes..."></textarea>
      </div>

      <div class="card">
        <h2>Clean Text</h2>
        <textarea id="cleaner" placeholder="Paste text to strip extra spaces, blank lines and duplicate words..."></textarea>
        <div class="row">
          <button class="btn primary" id="cleaner-clean">Clean</button>
          <button class="btn" id="cleaner-copy">Copy</button>
          <button class="btn danger-outline" id="cleaner-clear">Clear</button>
        </div>
      </div>

      <div class="card">
        <h2>Redirects</h2>
        <div class="row" id="redirect-links"></div>
      </div>

      <div class="card">
        <h2>Shortcuts</h2>
        <div id="shortcuts-body"></div>
      </div>
    </div>
  </section>
</div>

<footer>Personal project. No support or bug fixes provided.</footer>

<div class="cmdk-overlay" id="cmdk-overlay">
  <div class="cmdk-box">
    <input type="text" id="cmdk-input" class="cmdk-input" placeholder="Jump to a model or link..." autocomplete="off" spellcheck="false">
    <div class="cmdk-list" id="cmdk-list"></div>
    <div class="cmdk-hint">↑↓ navigate · Enter open · Esc close</div>
  </div>
</div>

<script>
(function () {
  "use strict";

  /* ============ DATA ============ */
  var AIS = [
    { name: "ChatGPT",    desc: "General purpose",  url: "https://chat.openai.com/",      accent: "#10A37F" },
    { name: "Claude",     desc: "Writing & code",   url: "https://claude.ai/new",         accent: "#D97757" },
    { name: "Gemini",     desc: "Multimodal",       url: "https://gemini.google.com/app", accent: "#4E8CFF" },
    { name: "Mistral",    desc: "Open-weight / EU", url: "https://chat.mistral.ai/chat",  accent: "#FF7000" },
    { name: "Perplexity", desc: "Web research",     url: "https://www.perplexity.ai/",    accent: "#20B8CD" },
    { name: "Grok",       desc: "Real-time data",   url: "https://grok.com/",             accent: "#9AA0A6" },
    { name: "DeepSeek",   desc: "Reasoning & code", url: "https://chat.deepseek.com/",    accent: "#4D6BFE" },
    { name: "DuckDuckGo", desc: "Privacy",          url: "https://duckduckgo.com/aichat", accent: "#DE5833" }
  ];

  var PROMPTS_CONTENT = [
    { label: "[Sum]",       text: "Summarize the following text concisely, focusing on the main points:\n\n" },
    { label: "[Explain]",   text: "Explain the following concept in simple terms, as if I were a beginner:\n\n" },
    { label: "[Fix]",       text: "Please correct the grammar, flow, and clarity of the following text while keeping the original meaning intact:\n\n" },
    { label: "[Translate]", text: "Translate the following text into natural sounding \"Language\":\n\n" },
    { label: "[List]",      text: "Organize the following information into a clear bullet-point list with a brief introduction and conclusion:\n\n" },
    { label: "[Ideas]",     text: "Give me 5 creative ideas or perspectives regarding the following topic:\n\n" },
    { label: "[Review]",    text: "Review the following text and point out any logical fallacies or missing information:\n\n" }
  ];

  var PROMPTS_STYLE = [
    { label: "[Lang]",      text: "From now on, please respond to all my messages exclusively in [language]." },
    { label: "[Assume]",    text: "Mention any assumptions you are making in your answer." },
    { label: "[Brief]",     text: "Keep your answer brief and avoid unnecessary filler words." },
    { label: "[Table]",     text: "Present the pros and cons in a table format." },
    { label: "[Steps]",     text: "Break this down into a step-by-step guide." },
    { label: "[Ask]",       text: "Before answering, ask me any questions you need to clarify my request." }
  ];

  var PROMPTS_MOOD = [
    { label: "[Formal]",   text: "Respond in a formal, professional tone." },
    { label: "[Casual]",   text: "Respond in a casual, relaxed tone." },
    { label: "[Sincere]",  text: "Respond in a sincere, honest, and direct tone." },
    { label: "[Friendly]", text: "Respond in a warm, friendly tone." },
    { label: "[Playful]",  text: "Respond in a playful, lighthearted tone." }
  ];

  /* ============ TIMER / STOPWATCH ============ */
  function formatTime(s) {
    var m = Math.floor(s / 60), sec = s % 60;
    return (m < 10 ? "0" : "") + m + ":" + (sec < 10 ? "0" : "") + sec;
  }

  function beep() {
    try {
      var Ctx = window.AudioContext || window.webkitAudioContext;
      var ctx = new Ctx();
      [0, 0.25].forEach(function (delay) {
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.type = "sine";
        osc.frequency.value = 880;
        gain.gain.setValueAtTime(0.0001, ctx.currentTime + delay);
        gain.gain.exponentialRampToValueAtTime(0.2, ctx.currentTime + delay + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + delay + 0.35);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(ctx.currentTime + delay);
        osc.stop(ctx.currentTime + delay + 0.35);
      });
    } catch (e) { /* audio not available, fail silently */ }
  }

  var pomoPreset = 25 * 60;
  var pomoSeconds = pomoPreset;
  var pomoInterval = null;
  var pomoRunning = false;
  var pomoTimeEl = document.getElementById("pomo-time");
  var pomoStartBtn = document.getElementById("pomo-start");
  var pomoMinutesInput = document.getElementById("pomo-minutes");

  function renderPomo() { pomoTimeEl.textContent = formatTime(pomoSeconds); }
  renderPomo();

  function pomoTick() {
    if (pomoSeconds <= 0) {
      clearInterval(pomoInterval);
      pomoInterval = null;
      pomoRunning = false;
      pomoStartBtn.textContent = "Start";
      pomoTimeEl.textContent = "Done";
      beep();
      return;
    }
    pomoSeconds--;
    renderPomo();
  }

  pomoStartBtn.addEventListener("click", function () {
    if (pomoRunning) {
      clearInterval(pomoInterval);
      pomoInterval = null;
      pomoRunning = false;
      pomoStartBtn.textContent = "Start";
    } else {
      if (pomoSeconds <= 0) pomoSeconds = pomoPreset;
      pomoRunning = true;
      pomoStartBtn.textContent = "Pause";
      pomoInterval = setInterval(pomoTick, 1000);
    }
  });

  document.getElementById("pomo-reset").addEventListener("click", function () {
    clearInterval(pomoInterval);
    pomoInterval = null;
    pomoRunning = false;
    pomoStartBtn.textContent = "Start";
    pomoSeconds = pomoPreset;
    renderPomo();
  });

  document.getElementById("pomo-set").addEventListener("click", function () {
    var minutes = parseInt(pomoMinutesInput.value, 10);
    if (!minutes || minutes < 1) minutes = 1;
    if (minutes > 180) minutes = 180;
    pomoMinutesInput.value = minutes;
    clearInterval(pomoInterval);
    pomoInterval = null;
    pomoRunning = false;
    pomoStartBtn.textContent = "Start";
    pomoPreset = minutes * 60;
    pomoSeconds = pomoPreset;
    renderPomo();
  });

  var swSeconds = 0;
  var swInterval = null;
  var swRunning = false;
  var swTimeEl = document.getElementById("sw-time");
  var swStartBtn = document.getElementById("sw-start");

  function renderSw() { swTimeEl.textContent = formatTime(swSeconds); }

  swStartBtn.addEventListener("click", function () {
    if (swRunning) {
      clearInterval(swInterval);
      swInterval = null;
      swRunning = false;
      swStartBtn.textContent = "Start";
    } else {
      swRunning = true;
      swStartBtn.textContent = "Pause";
      swInterval = setInterval(function () { swSeconds++; renderSw(); }, 1000);
    }
  });

  document.getElementById("sw-reset").addEventListener("click", function () {
    clearInterval(swInterval);
    swInterval = null;
    swRunning = false;
    swStartBtn.textContent = "Start";
    swSeconds = 0;
    renderSw();
  });

  /* ============ THEME ============ */
  var root = document.documentElement;
  function applyTheme(t) {
    root.setAttribute("data-theme", t);
    localStorage.setItem("acd-theme", t);
    var btn = document.getElementById("theme-toggle");
    btn.textContent = t === "dark" ? "☾ Theme" : "☀ Theme";
  }
  var savedTheme = localStorage.getItem("acd-theme");
  if (!savedTheme) {
    savedTheme = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
  }
  applyTheme(savedTheme);
  document.getElementById("theme-toggle").addEventListener("click", function () {
    applyTheme(root.getAttribute("data-theme") === "dark" ? "light" : "dark");
  });

  /* ============ FOCUS MODE ============ */
  var focusBtn = document.getElementById("focus-toggle");
  function applyFocus(on) {
    document.body.classList.toggle("focus-mode", on);
    focusBtn.setAttribute("aria-pressed", on ? "true" : "false");
    localStorage.setItem("acd-focus", on ? "1" : "0");
  }
  applyFocus(localStorage.getItem("acd-focus") === "1");
  focusBtn.addEventListener("click", function () {
    applyFocus(!document.body.classList.contains("focus-mode"));
  });

  /* ============ AI GRID ============ */
  var grid = document.getElementById("ai-grid");
  AIS.forEach(function (ai, i) {
    var card = document.createElement("div");
    card.className = "ai-card";
    card.tabIndex = 0;
    card.setAttribute("role", "button");
    card.setAttribute("aria-label", "Open " + ai.name + " (Alt+" + (i + 1) + ")");
    card.style.setProperty("--accent", ai.accent);
    card.innerHTML =
      '<span class="keycap">Alt+' + (i + 1) + '</span>' +
      '<span class="name">' + ai.name + '</span>' +
      '<span class="desc">' + ai.desc + '</span>';
    function open() { window.open(ai.url, "_blank", "noopener"); }
    card.addEventListener("click", open);
    card.addEventListener("keydown", function (e) {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); open(); }
    });
    grid.appendChild(card);
  });

  document.addEventListener("keydown", function (e) {
    if (!e.altKey) return;
    var n = parseInt(e.key, 10);
    if (n >= 1 && n <= 8) {
      e.preventDefault();
      window.open(AIS[n - 1].url, "_blank", "noopener");
    }
  });

  document.addEventListener("keydown", function (e) {
    if (e.key !== "/") return;
    var active = document.activeElement;
    var typing = active && (active.tagName === "INPUT" || active.tagName === "TEXTAREA");
    if (typing) return;
    e.preventDefault();
    document.getElementById("draft").focus();
  });

  /* ============ DRAFT / PROMPT LIBRARY ============ */
  var draft = document.getElementById("draft");
  var draftMeta = document.getElementById("draft-meta");
  draft.value = localStorage.getItem("acd-draft") || "";

  function updateMeta() {
    var text = draft.value;
    var words = text.trim() ? text.trim().split(/\s+/).length : 0;
    draftMeta.textContent = words + " words · " + text.length + " characters";
  }
  updateMeta();

  draft.addEventListener("input", function () {
    localStorage.setItem("acd-draft", draft.value);
    updateMeta();
  });

  /* ============ NOTES ============ */
  var notes = document.getElementById("notes");
  notes.value = localStorage.getItem("acd-notes") || "";
  notes.addEventListener("input", function () {
    localStorage.setItem("acd-notes", notes.value);
  });
  document.getElementById("notes-clear").addEventListener("click", function () {
    notes.value = "";
    localStorage.removeItem("acd-notes");
    notes.focus();
  });

  /* ============ CLEAN TEXT ============ */
  function cleanText(text) {
    // collapse repeated spaces/tabs
    text = text.replace(/[ \t]+/g, " ");
    // trim each line
    text = text.split("\n").map(function (line) { return line.trim(); }).join("\n");
    // collapse 3+ blank lines into a single blank line
    text = text.replace(/\n{3,}/g, "\n\n");
    // remove consecutive duplicate words (case-insensitive), keep first occurrence
    text = text.replace(/\b(\w+)(\s+\1\b)+/gi, "$1");
    return text.trim();
  }

  var cleaner = document.getElementById("cleaner");

  document.getElementById("cleaner-clean").addEventListener("click", function () {
    cleaner.value = cleanText(cleaner.value);
  });

  document.getElementById("cleaner-copy").addEventListener("click", function () {
    var btn = this;
    navigator.clipboard.writeText(cleaner.value).then(function () {
      var old = btn.textContent;
      btn.textContent = "Copied";
      setTimeout(function () { btn.textContent = old; }, 1200);
    });
  });

  document.getElementById("cleaner-clear").addEventListener("click", function () {
    cleaner.value = "";
    cleaner.focus();
  });

  var lib = document.getElementById("prompt-lib");
  function addChip(p) {
    var chip = document.createElement("button");
    chip.className = "chip";
    chip.type = "button";
    chip.textContent = p.label;
    chip.addEventListener("click", function () {
      draft.value += (draft.value && !draft.value.endsWith("\n") ? "\n" : "") + p.text;
      localStorage.setItem("acd-draft", draft.value);
      updateMeta();
      draft.focus();
    });
    lib.appendChild(chip);
  }
  function addDivider(text, extraClass) {
    var divider = document.createElement("span");
    divider.className = "prompt-divider" + (extraClass ? " " + extraClass : "");
    divider.textContent = text;
    lib.appendChild(divider);
  }
  addDivider("start of prompt", "divider-start");
  PROMPTS_CONTENT.forEach(addChip);
  addDivider("end of prompt", "divider-end");
  PROMPTS_STYLE.forEach(addChip);
  addDivider("mood", "divider-mood");
  PROMPTS_MOOD.forEach(addChip);

  document.getElementById("copy-draft").addEventListener("click", function () {
    var btn = this;
    navigator.clipboard.writeText(draft.value).then(function () {
      var old = btn.textContent;
      btn.textContent = "Copied";
      setTimeout(function () { btn.textContent = old; }, 1200);
    });
  });

  document.getElementById("save-draft").addEventListener("click", function () {
    if (!draft.value.trim()) return;
    var blob = new Blob([draft.value], { type: "text/plain" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    var stamp = new Date().toISOString().slice(0, 10);
    a.href = url;
    a.download = "draft-" + stamp + ".txt";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  document.getElementById("clear-draft").addEventListener("click", function () {
    draft.value = "";
    localStorage.removeItem("acd-draft");
    updateMeta();
    draft.focus();
  });

  /* ============ WIKIPEDIA SEARCH ============ */
  var wikiInput = document.getElementById("wiki-input");
  var wikiStatus = document.getElementById("wiki-status");

  function doWikiSearch() {
    var q = wikiInput.value.trim();
    if (!q) return;
    wikiStatus.textContent = "Searching...";
    var api = "https://en.wikipedia.org/w/api.php?action=opensearch&search=" +
      encodeURIComponent(q) + "&limit=1&namespace=0&format=json&origin=*";
    fetch(api)
      .then(function (r) { return r.json(); })
      .then(function (data) {
        var titles = data[1], links = data[3];
        if (links && links.length) {
          wikiStatus.textContent = "Opening: " + titles[0];
          window.open(links[0], "_blank", "noopener");
        } else {
          wikiStatus.textContent = "No results for \"" + q + "\".";
        }
      })
      .catch(function () {
        wikiStatus.textContent = "Search failed — opening Wikipedia search page instead.";
        window.open("https://en.wikipedia.org/w/index.php?search=" + encodeURIComponent(q), "_blank", "noopener");
      });
  }

  document.getElementById("wiki-btn").addEventListener("click", doWikiSearch);
  wikiInput.addEventListener("keydown", function (e) {
    if (e.key === "Enter") doWikiSearch();
  });

  /* ============ REDIRECTS ============ */
  var REDIRECTS = [
    { label: "Excalidraw", url: "https://excalidraw.com/" },
    { label: "Notion", url: "https://www.notion.so/" },
    { label: "NotebookLM", url: "https://notebooklm.google.com/" },
    { label: "Translator", url: "https://www.deepl.com/translator" },
    { label: "Donodaseves Utilities", url: "https://donodaseves.github.io/utilities/" }
  ];
  var redirectLinks = document.getElementById("redirect-links");
  REDIRECTS.forEach(function (r) {
    var link = document.createElement("a");
    link.className = "chip";
    link.href = r.url;
    link.target = "_blank";
    link.rel = "noopener";
    link.textContent = r.label;
    redirectLinks.appendChild(link);
  });

  /* ============ COMMAND PALETTE ============ */
  var CMDK_ITEMS = AIS.map(function (ai, i) {
    return { label: ai.name, tag: "Alt+" + (i + 1), url: ai.url };
  }).concat(REDIRECTS.map(function (r) {
    return { label: r.label, tag: "Redirect", url: r.url };
  }));

  var cmdkOverlay = document.getElementById("cmdk-overlay");
  var cmdkInput = document.getElementById("cmdk-input");
  var cmdkList = document.getElementById("cmdk-list");
  var cmdkFiltered = CMDK_ITEMS.slice();
  var cmdkActive = 0;

  function renderCmdkList() {
    cmdkList.innerHTML = "";
    if (!cmdkFiltered.length) {
      cmdkList.innerHTML = '<div class="cmdk-empty">No matches</div>';
      return;
    }
    cmdkFiltered.forEach(function (item, idx) {
      var el = document.createElement("div");
      el.className = "cmdk-item" + (idx === cmdkActive ? " active" : "");
      el.innerHTML = "<span>" + item.label + "</span><span class=\"cmdk-tag\">" + item.tag + "</span>";
      el.addEventListener("click", function () { openCmdkItem(item); });
      cmdkList.appendChild(el);
    });
  }

  function openCmdkItem(item) {
    window.open(item.url, "_blank", "noopener");
    closeCmdk();
  }

  function openCmdk() {
    cmdkOverlay.classList.add("open");
    cmdkInput.value = "";
    cmdkFiltered = CMDK_ITEMS.slice();
    cmdkActive = 0;
    renderCmdkList();
    setTimeout(function () { cmdkInput.focus(); }, 0);
  }

  function closeCmdk() {
    cmdkOverlay.classList.remove("open");
  }

  cmdkInput.addEventListener("input", function () {
    var q = cmdkInput.value.toLowerCase();
    cmdkFiltered = CMDK_ITEMS.filter(function (i) { return i.label.toLowerCase().indexOf(q) > -1; });
    cmdkActive = 0;
    renderCmdkList();
  });

  cmdkInput.addEventListener("keydown", function (e) {
    if (e.key === "ArrowDown") {
      e.preventDefault();
      if (cmdkFiltered.length) cmdkActive = (cmdkActive + 1) % cmdkFiltered.length;
      renderCmdkList();
    } else if (e.key === "ArrowUp") {
      e.preventDefault();
      if (cmdkFiltered.length) cmdkActive = (cmdkActive - 1 + cmdkFiltered.length) % cmdkFiltered.length;
      renderCmdkList();
    } else if (e.key === "Enter") {
      e.preventDefault();
      if (cmdkFiltered[cmdkActive]) openCmdkItem(cmdkFiltered[cmdkActive]);
    } else if (e.key === "Escape") {
      e.preventDefault();
      closeCmdk();
    }
  });

  cmdkOverlay.addEventListener("click", function (e) {
    if (e.target === cmdkOverlay) closeCmdk();
  });

  document.getElementById("cmdk-trigger").addEventListener("click", openCmdk);

  document.addEventListener("keydown", function (e) {
    var key = e.key.toLowerCase();
    if ((e.ctrlKey || e.metaKey) && key === "k") {
      e.preventDefault();
      if (cmdkOverlay.classList.contains("open")) closeCmdk(); else openCmdk();
    }
  });

  /* ============ SHORTCUTS ============ */
  var SHORTCUTS = [
    { key: "Alt+1–8", desc: "Open AI models" },
    { key: "Ctrl/⌘+K", desc: "Command palette" },
    { key: "/", desc: "Jump to draft" }
  ];

  var shortcutsBody = document.getElementById("shortcuts-body");
  SHORTCUTS.forEach(function (s) {
    var row = document.createElement("div");
    row.className = "shortcut-row";
    row.innerHTML = "<span>" + s.desc + "</span><span class=\"shortcut-key\">" + s.key + "</span>";
    shortcutsBody.appendChild(row);
  });

})();
</script>
</body>
</html>
